# backend-ci.yaml

name: Backend-CI

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yaml"

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
  IMAGE_NAME: m3music-backend
  WORKING_DIR: backend
  DOCKER_CONTEXT: backend
  DOCKERFILE_PATH: backend/Dockerfile

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: backend-v
          release_branches: master

      - name: Resolve Image Metadata
        id: meta
        run: |
          TAG="${{ steps.semver.outputs.new_tag }}"

          if [ -z "$TAG" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="backend-v0.0.0-${SHORT_SHA}"
          fi

          IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Validate Tag
        run: |
          echo "Generated tag: ${{ steps.meta.outputs.tag }}"

  test:
    runs-on: ubuntu-latest
    needs: prepare

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

  sonar:
    runs-on: ubuntu-latest
    needs: prepare
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ./backend
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    runs-on: ubuntu-latest
    needs: prepare

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

  build:
    runs-on: ubuntu-latest
    needs: [prepare, test]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reset Docker Context
        run: docker context use default

      - name: Build Image
        run: |
          docker build \
            -f backend/Dockerfile \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            -t "${{ needs.prepare.outputs.image }}" \
            ./backend

      - name: Save Image
        run: docker save "${{ needs.prepare.outputs.image }}" -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image-backend
          path: image.tar

  trivy:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-backend

      - name: Load Image
        run: docker load -i image.tar

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ needs.prepare.outputs.image }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  push:
    runs-on: ubuntu-latest
    needs: [prepare, trivy]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-backend

      - name: Load Image
        run: docker load -i image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Versioned Image
        run: docker push "${{ needs.prepare.outputs.image }}"

      - name: Push Latest Image
        run: |
          LATEST_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"
          docker tag "${{ needs.prepare.outputs.image }}" "$LATEST_IMAGE"
          docker push "$LATEST_IMAGE"

  release:
    runs-on: ubuntu-latest
    needs: [prepare, push]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.prepare.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Backend Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
